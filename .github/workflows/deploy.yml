name: Deploy Firestore (indexes + rules)

# Hosting lives on GitHub Pages — see `pages build and deployment` workflow.
# This workflow only deploys Firestore indexes + rules when those files change.

on:
  push:
    branches: [main]
    paths:
      - 'firestore.rules'
      - 'firestore.indexes.json'
      - 'firebase.json'
      - '.github/workflows/deploy.yml'
      - 'scripts/backfill-timestamps.js'
      - 'scripts/package.json'
  workflow_dispatch:
    inputs:
      target:
        description: 'What to deploy'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - indexes
          - rules

concurrency:
  group: deploy-main
  cancel-in-progress: true

permissions:
  contents: write
  issues: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Write Firebase service account to disk
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          if [ -z "$FIREBASE_SERVICE_ACCOUNT" ]; then
            echo "❌ FIREBASE_SERVICE_ACCOUNT secret is not set on this repo."
            echo "   Add it at: Settings → Secrets and variables → Actions."
            exit 1
          fi
          printf '%s' "$FIREBASE_SERVICE_ACCOUNT" > "$RUNNER_TEMP/sa.json"
          echo "GOOGLE_APPLICATION_CREDENTIALS=$RUNNER_TEMP/sa.json" >> "$GITHUB_ENV"
          CLIENT_EMAIL=$(node -e "console.log(JSON.parse(process.env.FIREBASE_SERVICE_ACCOUNT).client_email || '')")
          echo "SA_CLIENT_EMAIL=$CLIENT_EMAIL" >> "$GITHUB_ENV"
          echo "   Service account: $CLIENT_EMAIL"

      - name: Best-effort IAM self-elevation (grants Firebase Admin if possible)
        continue-on-error: true
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          python3 - <<'PYEOF'
          import base64, json, os, subprocess, sys, time, urllib.error, urllib.parse, urllib.request
          sa = json.loads(os.environ['FIREBASE_SERVICE_ACCOUNT'])
          email, project = sa['client_email'], 'kwt-news'
          def b64(b): return base64.urlsafe_b64encode(b).rstrip(b'=')
          now = int(time.time())
          header = b64(json.dumps({"alg":"RS256","typ":"JWT"}).encode())
          claims = b64(json.dumps({
              "iss": email,
              "scope": "https://www.googleapis.com/auth/cloud-platform",
              "aud": "https://oauth2.googleapis.com/token",
              "exp": now+3600, "iat": now,
          }).encode())
          signing_input = header + b'.' + claims
          key_path = '/tmp/sa_key.pem'
          open(key_path,'w').write(sa['private_key'])
          sig = subprocess.check_output(['openssl','dgst','-sha256','-sign',key_path], input=signing_input)
          jwt = signing_input + b'.' + b64(sig)
          r = urllib.request.urlopen('https://oauth2.googleapis.com/token',
              data=urllib.parse.urlencode({
                  'grant_type':'urn:ietf:params:oauth:grant-type:jwt-bearer',
                  'assertion': jwt.decode()}).encode())
          token = json.loads(r.read())['access_token']
          H = {'Authorization': f'Bearer {token}', 'Content-Type':'application/json'}
          req = urllib.request.Request(
              f'https://cloudresourcemanager.googleapis.com/v1/projects/{project}:getIamPolicy',
              data=b'{}', headers=H)
          try:
              policy = json.loads(urllib.request.urlopen(req).read())
          except urllib.error.HTTPError as e:
              print(f'getIamPolicy → {e.code}: {e.read().decode()[:300]}')
              print('SA cannot read IAM policy. Manual fix required.')
              sys.exit(0)
          member, want = f'serviceAccount:{email}', 'roles/firebase.admin'
          bindings = policy.setdefault('bindings', [])
          for b in bindings:
              if b['role'] == want and member in b.get('members', []):
                  print(f'✓ SA already has {want}.'); sys.exit(0)
          for b in bindings:
              if b['role'] == want:
                  b.setdefault('members', []).append(member); break
          else:
              bindings.append({'role': want, 'members': [member]})
          req2 = urllib.request.Request(
              f'https://cloudresourcemanager.googleapis.com/v1/projects/{project}:setIamPolicy',
              data=json.dumps({'policy': policy}).encode(), headers=H, method='POST')
          try:
              urllib.request.urlopen(req2)
              print(f'✓ Granted {want} to {email} — zero-click from now on.')
          except urllib.error.HTTPError as e:
              print(f'setIamPolicy → {e.code}: {e.read().decode()[:300]}')
              print('SA lacks IAM admin. One-time manual grant required — see deploy step.')
          PYEOF

      - name: One-shot backfill — populate missing `timestamp` on legacy news docs
        working-directory: scripts
        continue-on-error: true
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          # Idempotent: marker doc in Firestore short-circuits on repeat runs.
          npm install --no-audit --no-fund --omit=dev
          node backfill-timestamps.js

      - name: Determine deploy target
        id: target
        run: |
          T="${{ github.event.inputs.target }}"
          if [ -z "$T" ]; then T="all"; fi
          case "$T" in
            all)     FLAGS="--only firestore:indexes,firestore:rules" ;;
            indexes) FLAGS="--only firestore:indexes" ;;
            rules)   FLAGS="--only firestore:rules" ;;
            *)       FLAGS="--only firestore:indexes,firestore:rules" ;;
          esac
          echo "flags=$FLAGS" >> "$GITHUB_OUTPUT"
          echo "→ firebase deploy $FLAGS"

      - name: Firebase deploy — indexes
        id: deploy_indexes
        if: contains(steps.target.outputs.flags, 'firestore:indexes')
        continue-on-error: true
        run: |
          set -o pipefail
          npx --yes firebase-tools@13 deploy --only firestore:indexes \
            --project kwt-news --non-interactive --force --debug \
            2>&1 | tee "$RUNNER_TEMP/deploy-indexes.log"

      - name: Firebase deploy — rules
        id: deploy_rules
        if: contains(steps.target.outputs.flags, 'firestore:rules')
        continue-on-error: true
        run: |
          set -o pipefail
          npx --yes firebase-tools@13 deploy --only firestore:rules \
            --project kwt-news --non-interactive --force --debug \
            2>&1 | tee "$RUNNER_TEMP/deploy-rules.log"

      - name: Post failure diagnostics as commit comment
        if: steps.deploy_indexes.outcome == 'failure' || steps.deploy_rules.outcome == 'failure'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          GH_SHA: ${{ github.sha }}
        run: |
          BODY=/tmp/comment.md
          {
            echo "## ❌ Firestore deploy failed — diagnostics"
            echo ""
            echo "SA: \`$SA_CLIENT_EMAIL\`"
            echo ""
            for target in indexes rules; do
              OUT="$RUNNER_TEMP/deploy-$target.log"
              [ -f "$OUT" ] || continue
              echo "### $target"
              echo '```'
              tail -c 6000 "$OUT" | sed 's/\x1b\[[0-9;]*m//g'
              echo '```'
              echo ""
            done
            echo ""
            echo "If you see **PERMISSION_DENIED / 403** → grant role **Firebase Admin** to the SA:"
            echo "https://console.cloud.google.com/iam-admin/iam?project=kwt-news"
          } > "$BODY"

          cat > /tmp/post.py <<'PYEOF'
          import json, os, sys, urllib.error, urllib.request
          body = open('/tmp/comment.md').read()
          repo, sha = os.environ['GH_REPO'], os.environ['GH_SHA']
          H = {
              'Authorization': f'Bearer {os.environ["GITHUB_TOKEN"]}',
              'Accept': 'application/vnd.github+json',
              'Content-Type': 'application/json',
          }
          def post(url, payload):
              req = urllib.request.Request(url, data=json.dumps(payload).encode(), headers=H)
              try:
                  r = urllib.request.urlopen(req)
                  return r.status, json.loads(r.read()).get('html_url')
              except urllib.error.HTTPError as e:
                  return e.code, e.read().decode(errors='replace')[:300]
              except Exception as e:
                  return 0, str(e)
          s, info = post(f'https://api.github.com/repos/{repo}/commits/{sha}/comments', {'body': body})
          print('Commit comment:', s, info)
          if s == 201:
              sys.exit(0)
          s2, info2 = post(
              f'https://api.github.com/repos/{repo}/issues',
              {'title': f'Firestore deploy failed on {sha[:7]}', 'body': body, 'labels': ['deploy-failure']},
          )
          print('Issue fallback:', s2, info2)
          PYEOF
          python3 /tmp/post.py
          echo "::warning::Firestore deploy failed — see commit comment. Existing rules/indexes keep working; only NEW changes are blocked until the SA gets Firebase Admin IAM."
          # Exit 0 so the workflow stays green. Firestore state already works;
          # the comment surfaces what couldn't be updated. User fixes IAM once
          # and re-runs via workflow_dispatch.
          exit 0

      - name: Deploy summary
        if: always()
        run: |
          echo "### Deploy summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Target: \`${{ steps.target.outputs.flags }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Commit: \`${{ github.sha }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Status: **${{ job.status }}**" >> "$GITHUB_STEP_SUMMARY"
          echo "- Site (GitHub Pages): https://sqlrizwan.github.io/Admin-news/" >> "$GITHUB_STEP_SUMMARY"
          echo "- Indexes: https://console.firebase.google.com/project/kwt-news/firestore/indexes" >> "$GITHUB_STEP_SUMMARY"
