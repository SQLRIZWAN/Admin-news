name: Deploy Admin Panel (Firestore + Hosting)

on:
  push:
    branches: [main]
    paths:
      - 'app_jsx.jsx'
      - 'index.html'
      - 'firestore.rules'
      - 'firestore.indexes.json'
      - 'firebase.json'
      - 'package.json'
      - 'package-lock.json'
      - 'babel.config.json'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:
    inputs:
      target:
        description: 'What to deploy'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - indexes
          - rules
          - hosting

concurrency:
  group: deploy-main
  cancel-in-progress: true

permissions:
  contents: write
  issues: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build admin panel (JSX → app.compiled.js)
        run: npm run build

      - name: Write Firebase service account to disk
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          if [ -z "$FIREBASE_SERVICE_ACCOUNT" ]; then
            echo "❌ FIREBASE_SERVICE_ACCOUNT secret is not set on this repo."
            echo "   Add it at: Settings → Secrets and variables → Actions."
            exit 1
          fi
          printf '%s' "$FIREBASE_SERVICE_ACCOUNT" > "$RUNNER_TEMP/sa.json"
          echo "GOOGLE_APPLICATION_CREDENTIALS=$RUNNER_TEMP/sa.json" >> "$GITHUB_ENV"
          # Extract client_email so later steps can point the user at the right SA.
          CLIENT_EMAIL=$(node -e "console.log(JSON.parse(process.env.FIREBASE_SERVICE_ACCOUNT).client_email || '')")
          echo "SA_CLIENT_EMAIL=$CLIENT_EMAIL" >> "$GITHUB_ENV"
          echo "   Service account: $CLIENT_EMAIL"

      - name: Pre-flight — verify SA can read the project
        run: |
          set +e
          OUT=$(npx --yes firebase-tools@13 projects:list --json 2>&1)
          RC=$?
          set -e
          if [ $RC -ne 0 ] || ! echo "$OUT" | grep -q '"projectId": *"kwt-news"'; then
            echo "❌ The service account cannot see project kwt-news."
            echo "   Fix once in GCP Console → IAM:"
            echo "     https://console.cloud.google.com/iam-admin/iam?project=kwt-news"
            echo "   Grant the principal '$SA_CLIENT_EMAIL' these roles:"
            echo "     • Firebase Admin  (or)"
            echo "     • Cloud Datastore Index Admin + Firebase Rules Admin + Firebase Hosting Admin"
            echo "   Then re-run this workflow. No code change required."
            echo ""
            echo "firebase-tools output:"
            echo "$OUT"
            exit 1
          fi
          echo "✓ Service account has access to kwt-news."

      - name: One-shot backfill — populate missing `timestamp` on legacy news docs
        working-directory: scripts
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          # Idempotent: marker doc in Firestore short-circuits on repeat runs.
          # First run fixes any legacy docs; subsequent runs finish in <2s.
          npm install --no-audit --no-fund --omit=dev
          node backfill-timestamps.js

      - name: Determine deploy target
        id: target
        run: |
          T="${{ github.event.inputs.target }}"
          if [ -z "$T" ]; then T="all"; fi
          case "$T" in
            all)     FLAGS="--only firestore:indexes,firestore:rules,hosting" ;;
            indexes) FLAGS="--only firestore:indexes" ;;
            rules)   FLAGS="--only firestore:rules" ;;
            hosting) FLAGS="--only hosting" ;;
            *)       FLAGS="--only firestore:indexes,firestore:rules,hosting" ;;
          esac
          echo "flags=$FLAGS" >> "$GITHUB_OUTPUT"
          echo "→ firebase deploy $FLAGS"

      - name: Firebase deploy — indexes
        id: deploy_indexes
        if: contains(steps.target.outputs.flags, 'firestore:indexes') || contains(steps.target.outputs.flags, 'all')
        continue-on-error: true
        run: |
          set -o pipefail
          npx --yes firebase-tools@13 deploy --only firestore:indexes \
            --project kwt-news --non-interactive --force --debug \
            2>&1 | tee "$RUNNER_TEMP/deploy-indexes.log"

      - name: Firebase deploy — rules
        id: deploy_rules
        if: contains(steps.target.outputs.flags, 'firestore:rules') || contains(steps.target.outputs.flags, 'all')
        continue-on-error: true
        run: |
          set -o pipefail
          npx --yes firebase-tools@13 deploy --only firestore:rules \
            --project kwt-news --non-interactive --force --debug \
            2>&1 | tee "$RUNNER_TEMP/deploy-rules.log"

      - name: Firebase deploy — hosting
        id: deploy_hosting
        if: contains(steps.target.outputs.flags, 'hosting') || contains(steps.target.outputs.flags, 'all')
        continue-on-error: true
        run: |
          set -o pipefail
          npx --yes firebase-tools@13 deploy --only hosting \
            --project kwt-news --non-interactive --force --debug \
            2>&1 | tee "$RUNNER_TEMP/deploy-hosting.log"

      - name: Post failure diagnostics as commit comment
        if: steps.deploy_indexes.outcome == 'failure' || steps.deploy_rules.outcome == 'failure' || steps.deploy_hosting.outcome == 'failure'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          GH_SHA: ${{ github.sha }}
        run: |
          BODY=/tmp/comment.md
          {
            echo "## ❌ Deploy failed — diagnostics"
            echo ""
            echo "SA: \`$SA_CLIENT_EMAIL\`"
            echo ""
            for target in indexes rules hosting; do
              OUT="$RUNNER_TEMP/deploy-$target.log"
              [ -f "$OUT" ] || continue
              echo "### $target"
              echo '```'
              tail -c 6000 "$OUT" | sed 's/\x1b\[[0-9;]*m//g'
              echo '```'
              echo ""
            done
            echo ""
            echo "If you see **PERMISSION_DENIED / 403** → grant role **Firebase Admin** to the SA:"
            echo "https://console.cloud.google.com/iam-admin/iam?project=kwt-news"
          } > "$BODY"

          cat > /tmp/post.py <<'PYEOF'
          import json, os, sys, urllib.request, urllib.error
          body = open('/tmp/comment.md').read()
          repo = os.environ['GH_REPO']
          sha  = os.environ['GH_SHA']
          token = os.environ['GITHUB_TOKEN']
          H = {
              'Authorization': f'Bearer {token}',
              'Accept': 'application/vnd.github+json',
              'Content-Type': 'application/json',
          }

          def post(url, payload):
              req = urllib.request.Request(url, data=json.dumps(payload).encode(), headers=H)
              try:
                  r = urllib.request.urlopen(req)
                  return r.status, json.loads(r.read()).get('html_url')
              except urllib.error.HTTPError as e:
                  return e.code, e.read().decode(errors='replace')[:300]
              except Exception as e:
                  return 0, str(e)

          # Try commit comment first.
          status, info = post(f'https://api.github.com/repos/{repo}/commits/{sha}/comments', {'body': body})
          print('Commit-comment POST:', status, info)
          if status == 201:
              sys.exit(0)
          # Fallback: open a tracking issue.
          status2, info2 = post(
              f'https://api.github.com/repos/{repo}/issues',
              {'title': f'Deploy failed on {sha[:7]}', 'body': body, 'labels': ['deploy-failure']},
          )
          print('Issue POST:', status2, info2)
          PYEOF
          python3 /tmp/post.py
          echo "::error::Deploy failed — see commit comment for log tail."
          exit 1

      - name: Deploy summary
        if: always()
        run: |
          echo "### Deploy summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Target: \`${{ steps.target.outputs.flags }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Commit: \`${{ github.sha }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Status: **${{ job.status }}**" >> "$GITHUB_STEP_SUMMARY"
          echo "- Hosted: https://kwt-news.web.app" >> "$GITHUB_STEP_SUMMARY"
          echo "- Indexes: https://console.firebase.google.com/project/kwt-news/firestore/indexes" >> "$GITHUB_STEP_SUMMARY"
