name: 💼 Auto News — Kuwait Jobs

on:
  schedule:
    # 09:00 Kuwait time (UTC+3) every 2 days = 06:00 UTC
    - cron: '0 6 */2 * *'
  workflow_dispatch:

jobs:
  post-news:
    name: Kuwait Jobs Video
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scripts/video_pipeline/requirements.txt

      - name: Install system deps
        run: sudo apt-get update -q && sudo apt-get install -y -q ffmpeg fonts-dejavu-core fonts-liberation

      - name: Install Python deps
        run: pip install -r scripts/video_pipeline/requirements.txt

      - name: Run pipeline
        env:
          GEMINI_API_KEY:           ${{ secrets.GEMINI_API_KEY }}
          PEXELS_API_KEY:           ${{ secrets.PEXELS_API_KEY }}
          PIXABAY_API_KEY:          ${{ secrets.PIXABAY_API_KEY }}
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: python scripts/video_pipeline/main.py --category=kuwait-jobs
